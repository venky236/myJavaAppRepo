name: "Terraform Pipeline for pwc-aup-infra"

on:
  pull_request:
    branches: [main]
    paths:
      - "base/environments/*.tfvars"
      - "clay/environments/*.tfvars"
      - "kiln-trace/environments/*.tfvars"
      - "integration-user/environments/*.tfvars"
      # Exclude prod until prod secrets are configured
      - "!base/environments/prod.tfvars"
      - "!clay/environments/prod.tfvars"
      - "!kiln-trace/environments/prod.tfvars"
      - "!integration-user/environments/prod.tfvars"

  push:
    branches: [main]
    paths:
      - "base/environments/*.tfvars"
      - "clay/environments/*.tfvars"
      - "kiln-trace/environments/*.tfvars"
      - "integration-user/environments/*.tfvars"
      - "!base/environments/prod.tfvars"
      - "!clay/environments/prod.tfvars"
      - "!kiln-trace/environments/prod.tfvars"
      - "!integration-user/environments/prod.tfvars"

  workflow_dispatch:
    inputs:
      stack:
        description: "Terraform stack"
        required: true
        type: choice
        options:
          - base
          - clay
          - kiln-trace
          - integration-user

      env:
        description: "Environment"
        required: true
        type: choice
        options:
          - qa
          - staging

      acct:
        description: "AWS Account"
        required: true
        type: choice
        options:
          - nonprod
          - prod

env:
  TF_VERSION: "1.12.x"
  AWS_REGION: "us-east-1"

concurrency:
  group: terraform-pipeline-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  pull-requests: write
  actions: read

jobs:
  # ── Detect which stack/env pairs changed (PR and push only) ──────────────
  detect-changes:
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    name: "Detect changed stacks"
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.changed.outputs.matrix }}
      has_changes: ${{ steps.changed.outputs.has_changes }}
    steps:
      - uses: actions/checkout@eef61447b9ff4aafe5dcd4e0bbf5d482be7e7871 # v4.2.1
        with:
          fetch-depth: 0

      - name: Detect changed stacks
        id: changed
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
          else
            BASE="${{ github.event.before }}"
          fi

          # Guard against zero SHA (first push to a new branch)
          if [[ "$BASE" == "0000000000000000000000000000000000000000" || -z "$BASE" ]]; then
            BASE="$(git rev-parse HEAD~1 2>/dev/null || git rev-parse HEAD)"
          fi

          # Only look at changed tfvars files. The env and stack are derived
          # directly from the file path: <stack>/environments/<env>.tfvars
          MATRIX=$(git diff --name-only "$BASE" HEAD \
            | grep -E '^(base|clay|kiln-trace|integration-user)/environments/[^/]+\.tfvars$' \
            | awk -F'/' '{
                stack = $1
                env   = $3
                sub(/\.tfvars$/, "", env)
                acct  = (env == "prod") ? "prod" : "nonprod"
                printf "{\"stack\":\"%s\",\"env\":\"%s\",\"acct\":\"%s\"}\n", stack, env, acct
              }' \
            | sort -u \
            | jq -sc '.')

          echo "matrix=${MATRIX}" >> "$GITHUB_OUTPUT"

          if [ "$MATRIX" = "[]" ] || [ -z "$MATRIX" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

  # ── PR opened/updated: plan + comment ─────────────────────────────────────
  plan:
    name: "Plan (PR) – ${{ matrix.stack }} / ${{ matrix.env }}"
    needs: detect-changes
    if: github.event_name == 'pull_request' && needs.detect-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@eef61447b9ff4aafe5dcd4e0bbf5d482be7e7871 # v4.2.1

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@d0834ad3a60a024346910e522a81b0002bd37fea # v4.3.0
        with:
          # TODO: when prod is enabled, select creds based on matrix.acct
          aws-access-key-id: ${{ secrets.NONPROD_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.NONPROD_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@f4c6bf6752984b3a29fcc135a5e70eb792c40c6b # v1.8.0
        with:
          app-id: ${{ secrets.AMPLIWORK_PKG_READER_APP_ID }}
          private-key: ${{ secrets.AMPLIWORK_PKG_READER_PRIVATE_KEY }}
          repositories: aw-terraform-aws-modules

      - name: Configure git for private modules
        run: git config --global url."https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/".insteadOf "https://github.com/"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      # ── Quality gates ────────────────────────────────────────────────────
      - name: Terraform fmt
        id: fmt
        working-directory: ${{ matrix.stack }}
        run: terraform fmt -check -recursive -diff
        continue-on-error: true

      - name: Terraform init
        id: init
        working-directory: ${{ matrix.stack }}
        run: terraform init -reconfigure -backend-config="config/${{ matrix.env }}.hcl"

      - name: Terraform validate
        id: validate
        working-directory: ${{ matrix.stack }}
        run: terraform validate -no-color

      - name: tfsec
        uses: aquasecurity/tfsec-action@b466648d6e39e7c75324f25d83891162a721f2d6 # v1.0.3
        with:
          working_directory: ${{ matrix.stack }}
          soft_fail: true

      - name: Checkov
        uses: bridgecrewio/checkov-action@ffbf56d2e40f8e09a94a2b0d95477fabff82c6dc # v12.1671.0
        with:
          directory: ${{ matrix.stack }}
          config_file: .checkov.yml
          soft_fail: true

      # ── Plan ─────────────────────────────────────────────────────────────
      - name: Terraform plan
        id: plan
        working-directory: ${{ matrix.stack }}
        run: |
          set -o pipefail
          terraform plan -no-color -input=false -out=tfplan \
            -var-file="environments/${{ matrix.env }}.tfvars" 2>&1 | tee plan-output.txt

      - name: Post plan to job summary
        if: always()
        run: |
          {
            echo "### Terraform Plan – \`${{ matrix.stack }}\` / \`${{ matrix.env }}\`"
            echo ""
            echo "| Step     | Status |"
            echo "|----------|--------|"
            echo "| fmt      | \`${{ steps.fmt.outcome }}\` |"
            echo "| init     | \`${{ steps.init.outcome }}\` |"
            echo "| validate | \`${{ steps.validate.outcome }}\` |"
            echo "| plan     | \`${{ steps.plan.outcome }}\` |"
            echo ""
            echo "<details><summary>Show Plan</summary>"
            echo ""
            echo '```terraform'
            cat "${{ matrix.stack }}/plan-output.txt" 2>/dev/null || echo "No plan output captured."
            echo '```'
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Post plan to PR
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        if: always()
        with:
          github-token: ${{ github.token }}
          script: |
            const fs = require('fs');
            let plan = '';
            try {
              plan = fs.readFileSync('${{ matrix.stack }}/plan-output.txt', 'utf8');
            } catch (e) {
              plan = 'Plan output unavailable.';
            }
            if (plan.length > 60000) {
              plan = plan.slice(0, 60000) + '\n... (truncated, see job summary for full output)';
            }

            const output = `### Terraform Plan – \`${{ matrix.stack }}\` / \`${{ matrix.env }}\`

            | Step     | Status |
            |----------|--------|
            | fmt      | \`${{ steps.fmt.outcome }}\` |
            | init     | \`${{ steps.init.outcome }}\` |
            | validate | \`${{ steps.validate.outcome }}\` |
            | plan     | \`${{ steps.plan.outcome }}\` |

            <details><summary>Show Plan</summary>

            \`\`\`terraform
            ${plan}
            \`\`\`

            </details>`;

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

  # ── PR merged (push to main): re-plan, show output, wait for manual apply ─
  plan-on-merge:
    name: "Plan (post-merge) – ${{ matrix.stack }} / ${{ matrix.env }}"
    needs: detect-changes
    if: github.event_name == 'push' && needs.detect-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@eef61447b9ff4aafe5dcd4e0bbf5d482be7e7871 # v4.2.1

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@d0834ad3a60a024346910e522a81b0002bd37fea # v4.3.0
        with:
          # TODO: when prod is enabled, select creds based on matrix.acct
          aws-access-key-id: ${{ secrets.NONPROD_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.NONPROD_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@f4c6bf6752984b3a29fcc135a5e70eb792c40c6b # v1.8.0
        with:
          app-id: ${{ secrets.AMPLIWORK_PKG_READER_APP_ID }}
          private-key: ${{ secrets.AMPLIWORK_PKG_READER_PRIVATE_KEY }}
          repositories: aw-terraform-aws-modules

      - name: Configure git for private modules
        run: git config --global url."https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/".insteadOf "https://github.com/"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform init
        working-directory: ${{ matrix.stack }}
        run: terraform init -reconfigure -backend-config="config/${{ matrix.env }}.hcl"

      - name: Terraform plan
        id: plan
        working-directory: ${{ matrix.stack }}
        run: |
          set -o pipefail
          terraform plan -no-color -input=false -out=tfplan \
            -var-file="environments/${{ matrix.env }}.tfvars" 2>&1 | tee plan-output.txt

      - name: Post plan to job summary
        if: always()
        run: |
          {
            echo "### Terraform Plan (post-merge) – \`${{ matrix.stack }}\` / \`${{ matrix.env }}\`"
            echo ""
            echo "**To apply:** Actions -> Run workflow -> stack=\`${{ matrix.stack }}\`, env=\`${{ matrix.env }}\`, acct=\`${{ matrix.acct }}\` (applies the latest plan on main automatically)"
            echo ""
            echo "| Step | Status |"
            echo "|------|--------|"
            echo "| plan | \`${{ steps.plan.outcome }}\` |"
            echo ""
            echo "<details><summary>Show Plan</summary>"
            echo ""
            echo '```terraform'
            cat "${{ matrix.stack }}/plan-output.txt" 2>/dev/null || echo "No plan output captured."
            echo '```'
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ matrix.stack }}-${{ matrix.env }}
          path: ${{ matrix.stack }}/tfplan
          retention-days: 7

  # ── Manual apply: the approval gate ───────────────────────────────────────
  # Triggered only by workflow_dispatch. Finds the latest successful
  # post-merge plan for the chosen stack/env and applies that exact plan
  # artifact (never a freshly-generated one), so what's applied is exactly
  # what was reviewed in the job summary.
  apply:
    name: "Apply (approved via workflow_dispatch) – ${{ inputs.stack }} / ${{ inputs.env }}"
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@eef61447b9ff4aafe5dcd4e0bbf5d482be7e7871 # v4.2.1

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@d0834ad3a60a024346910e522a81b0002bd37fea # v4.3.0
        with:
          # TODO: when prod is enabled, select creds based on inputs.acct
          aws-access-key-id: ${{ secrets.NONPROD_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.NONPROD_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@f4c6bf6752984b3a29fcc135a5e70eb792c40c6b # v1.8.0
        with:
          app-id: ${{ secrets.AMPLIWORK_PKG_READER_APP_ID }}
          private-key: ${{ secrets.AMPLIWORK_PKG_READER_PRIVATE_KEY }}
          repositories: aw-terraform-aws-modules

      - name: Configure git for private modules
        run: git config --global url."https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/".insteadOf "https://github.com/"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform init
        working-directory: ${{ inputs.stack }}
        run: terraform init -reconfigure -backend-config="config/${{ inputs.env }}.hcl"

      - name: Find latest post-merge plan run
        id: find-run
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        with:
          script: |
            const { data } = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'terraform-pipeline.yml',
              event: 'push',
              status: 'success',
              branch: 'main',
              per_page: 20
            });

            if (data.workflow_runs.length === 0) {
              core.setFailed('No successful post-merge plan runs found on main. Merge a change first.');
              return;
            }

            const latest = data.workflow_runs[0];
            core.info(`Using plan from run ${latest.id} (${latest.html_url})`);
            core.setOutput('run_id', latest.id);
            core.setOutput('run_url', latest.html_url);

      - name: Download reviewed plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ inputs.stack }}-${{ inputs.env }}
          path: ${{ inputs.stack }}
          run-id: ${{ steps.find-run.outputs.run_id }}
          github-token: ${{ github.token }}

      - name: Record approval
        run: |
          {
            echo "### Apply approved and triggered manually"
            echo "- Approved/triggered by: \`${{ github.actor }}\`"
            echo "- Stack/env: \`${{ inputs.stack }}\` / \`${{ inputs.env }}\`"
            echo "- Plan applied from run: ${{ steps.find-run.outputs.run_url }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Terraform apply
        working-directory: ${{ inputs.stack }}
        run: terraform apply -auto-approve -input=false tfplan
