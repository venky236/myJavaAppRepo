name: "Terraform Pipeline"

# Flow:
#   1. PR opened/updated  -> "plan" job runs terraform plan, comments on PR.
#   2. PR merged (push)   -> "plan-on-merge" re-runs terraform plan, posts
#                            the output to the job summary, uploads the
#                            plan as an artifact. Nothing is applied yet.
#   3. Manual apply        -> a human reviews the job summary from step 2,
#                            copies that run's ID, then goes to
#                            Actions -> Run workflow, and runs this same
#                            workflow with the run ID + stack/env/acct.
#                            The "apply" job downloads the exact plan
#                            artifact from that run and applies it.
#
# The approval gate is the workflow_dispatch step itself: only someone who
# deliberately finds the reviewed run's ID and dispatches this workflow can
# trigger an apply.

on:
  pull_request:
    branches: [main]
    paths:
      - "base/environments/*.tfvars"
      - "clay/environments/*.tfvars"

  push:
    branches: [main]
    paths:
      - "base/environments/*.tfvars"
      - "clay/environments/*.tfvars"

  workflow_dispatch:
    inputs:
      stack:
        description: "Terraform stack"
        required: true
        type: choice
        options:
          - base
          - clay

      env:
        description: "Environment"
        required: true
        type: choice
        options:
          - qa
          - staging

      acct:
        description: "AWS Account"
        required: true
        type: choice
        options:
          - nonprod
          - prod

      plan_run_id:
        description: "Run ID of the post-merge plan you want to apply"
        required: true
        type: string

concurrency:
  group: terraform-pipeline-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  pull-requests: write
  actions: read

jobs:
  detect-changes:
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    name: "Detect changed stacks"
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.changed.outputs.matrix }}
      has_changes: ${{ steps.changed.outputs.has_changes }}
    steps:
      - uses: actions/checkout@eef61447b9ff4aafe5dcd4e0bbf5d482be7e7871 # v4.2.1
        with:
          fetch-depth: 0

      - name: Detect changed stacks
        id: changed
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
          else
            BASE="${{ github.event.before }}"
          fi

          if [[ "$BASE" == "0000000000000000000000000000000000000000" || -z "$BASE" ]]; then
            BASE="$(git rev-parse HEAD~1 2>/dev/null || git rev-parse HEAD)"
          fi

          MATRIX=$(git diff --name-only "$BASE" HEAD \
            | grep -E '^(base|clay)/environments/[^/]+\.tfvars$' \
            | awk -F'/' '{
                stack = $1
                env   = $3
                sub(/\.tfvars$/, "", env)
                acct  = (env == "prod") ? "prod" : "nonprod"
                printf "{\"stack\":\"%s\",\"env\":\"%s\",\"acct\":\"%s\"}\n", stack, env, acct
              }' \
            | sort -u \
            | jq -sc '.')

          echo "matrix=${MATRIX}" >> "$GITHUB_OUTPUT"

          if [ "$MATRIX" = "[]" ] || [ -z "$MATRIX" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

  plan:
    name: "Plan (PR) – ${{ matrix.stack }} / ${{ matrix.env }}"
    needs: detect-changes
    if: github.event_name == 'pull_request' && needs.detect-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@eef61447b9ff4aafe5dcd4e0bbf5d482be7e7871 # v4.2.1

      - name: Terraform plan
        id: plan
        run: |
          mkdir -p ${{ matrix.stack }}
          {
            echo "Plan: 1 to add, 0 to change, 0 to destroy."
            echo "  + null_resource.example_${{ matrix.env }}"
            echo "Generated at $(date -u)"
          } | tee ${{ matrix.stack }}/plan-output.txt
          echo "plan output for ${{ matrix.stack }}/${{ matrix.env }}" > ${{ matrix.stack }}/tfplan

      - name: Post plan to job summary
        if: always()
        run: |
          {
            echo "### Terraform Plan – \`${{ matrix.stack }}\` / \`${{ matrix.env }}\`"
            echo ""
            echo '```'
            cat "${{ matrix.stack }}/plan-output.txt"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Post plan to PR
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        if: always()
        with:
          github-token: ${{ github.token }}
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('${{ matrix.stack }}/plan-output.txt', 'utf8');
            const output = `### Terraform Plan – \`${{ matrix.stack }}\` / \`${{ matrix.env }}\`\n\n\`\`\`\n${plan}\n\`\`\``;
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

  plan-on-merge:
    name: "Plan (post-merge) – ${{ matrix.stack }} / ${{ matrix.env }}"
    needs: detect-changes
    if: github.event_name == 'push' && needs.detect-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@eef61447b9ff4aafe5dcd4e0bbf5d482be7e7871 # v4.2.1

      - name: Terraform plan
        id: plan
        run: |
          mkdir -p ${{ matrix.stack }}
          {
            echo "Plan: 1 to add, 0 to change, 0 to destroy."
            echo "  + null_resource.example_${{ matrix.env }}"
            echo "Generated at $(date -u) from run ${{ github.run_id }}"
          } | tee ${{ matrix.stack }}/plan-output.txt
          echo "plan output for ${{ matrix.stack }}/${{ matrix.env }} run ${{ github.run_id }}" > ${{ matrix.stack }}/tfplan

      - name: Post plan to job summary
        if: always()
        run: |
          {
            echo "### Terraform Plan (post-merge) – \`${{ matrix.stack }}\` / \`${{ matrix.env }}\`"
            echo ""
            echo "**To apply:** Actions -> Run workflow -> stack=\`${{ matrix.stack }}\`, env=\`${{ matrix.env }}\`, acct=\`${{ matrix.acct }}\`, plan_run_id=\`${{ github.run_id }}\`"
            echo ""
            echo '```'
            cat "${{ matrix.stack }}/plan-output.txt"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ matrix.stack }}-${{ matrix.env }}
          path: ${{ matrix.stack }}/tfplan
          retention-days: 7

  apply:
    name: "Apply (approved via workflow_dispatch) – ${{ inputs.stack }} / ${{ inputs.env }}"
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Download reviewed plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ inputs.stack }}-${{ inputs.env }}
          path: ${{ inputs.stack }}
          run-id: ${{ inputs.plan_run_id }}
          github-token: ${{ github.token }}

      - name: Terraform apply
        run: |
          echo "### Apply approved and triggered manually" >> "$GITHUB_STEP_SUMMARY"
          echo "- Approved/triggered by: \`${{ github.actor }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Stack/env: \`${{ inputs.stack }}\` / \`${{ inputs.env }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Plan reviewed in run: \`${{ inputs.plan_run_id }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "Applying plan:"
          cat ${{ inputs.stack }}/tfplan
